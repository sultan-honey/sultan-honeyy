<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلطان العسل - نظام الطلبات</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <img src="1000031072.png" alt="شعار سلطان العسل" class="main-logo">
            <h1 class="system-title">سلطان العسل</h1>
            <p class="system-subtitle">نظام الطلبات</p>
        </header>

        <section class="form-section">
            <div class="input-grid">
                <input type="text" id="custName" placeholder="👤 اسم العميل">
                <select id="empName">
                    <option value="">👤 موظف خدمة العملاء</option>
                    <option value="عمر">عمر</option>
                    <option value="مريم">مريم</option>
                </select>
                <input type="text" id="prepEmp" placeholder="👨‍🍳 مسؤول التجهيز">
                <input type="text" id="orderID" placeholder="🔢 رقم الطلب">
                <input type="text" id="trackingID" placeholder="📄 رقم البوليصة">
                <input type="number" id="orderPrice" placeholder="💰 السعر">
                
                <select id="branchName">
                    <option value="فرع المحالة">📍 فرع المحالة</option>
                    <option value="فرع الروضة">📍 فرع الروضة</option>
                    <option value="فرع التعمير">📍 فرع التعمير</option>
                </select>

                <select id="deliveryType">
                    <option value="توصيل مندوب">🛵 توصيل مندوب</option>
                    <option value="شحن سمسا">📦 شحن سمسا</option>
                    <option value="استلام من الفرع">🏠 استلام من الفرع</option>
                </select>

                <select id="orderType">
                    <option value="سلة">🛒 طلب سلة</option>
                    <option value="واتساب">💬 طلب واتساب</option>
                </select>
            </div>
            <button onclick="saveOrder()" class="btn-primary">إضافة وحفظ الطلب ✅</button>
        </section>

        <div class="admin-actions">
            <button onclick="toggleArchive()" id="archiveBtn" class="btn-secondary">📂 سجل الأرشيف</button>
            <div class="print-grid-actions">
                <button onclick="printByEmp('عمر')" class="btn-print-yellow">⎙ طباعة عمر</button>
                <button onclick="printByEmp('مريم')" class="btn-print-yellow">⎙ طباعة مريم</button>
                <button onclick="printAllToday()" class="btn-print-green">⎙ طباعة طلبات اليوم كاملة</button>
            </div>
        </div>

        <main id="printArea" class="main-content">
            <div class="list-column">
                <h2 class="section-title">🛒 طلبات سلة</h2>
                <div id="sallaList" class="list-container"></div>
            </div>
            <div class="list-column">
                <h2 class="section-title">💬 طلبات واتساب</h2>
                <div id="whatsappList" class="list-container"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

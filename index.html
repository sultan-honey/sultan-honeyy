<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلطان العسل - النظام المتكامل</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="loginScreen" class="login-overlay">
        <div class="login-box">
            <img src="1000031072.png" class="login-logo">
            <h2>تسجيل الدخول</h2>
            <div class="login-fields">
                <input type="text" id="username" placeholder="اسم المستخدم">
                <input type="password" id="password" placeholder="كلمة المرور">
                <button onclick="login()" class="btn-primary-gold">دخول للنظام</button>
            </div>
        </div>
    </div>

    <div id="appBody" class="app-container" style="display: none;">
        <header class="main-header">
            <button onclick="logout()" class="btn-logout">خروج</button>
            <div class="header-center">
                <img src="1000031072.png" class="header-logo">
                <h1 class="system-title">سلطان العسل</h1>
            </div>
            <div id="userWelcome"></div>
        </header>

        <section class="smart-paste-area">
            <textarea id="smartInput" placeholder="الصق بيانات طلب سلة هنا..."></textarea>
            <button onclick="processSmartPaste()" class="btn-extract">✨ استخراج البيانات الذكي</button>
        </section>

        <section class="form-section">
            <div class="input-grid">
                <input type="text" id="custName" placeholder="👤 اسم العميل">
                <input type="text" id="orderID" placeholder="🔢 رقم الطلب">
                <input type="text" id="trackingID" placeholder="📄 رقم البوليصة">
                <input type="number" id="orderPrice" placeholder="💰 السعر الإجمالي">
                <input type="text" id="prepEmp" placeholder="👨‍🍳 مسؤول التجهيز">
                <select id="branchName">
                    <option>📍 فرع المحالة</option>
                    <option>📍 فرع الروضة</option>
                    <option>📍 فرع التعمير</option>
                </select>
                <select id="deliveryType">
                    <option>📦 شحن سمسا</option>
                    <option>🛵 توصيل مندوب</option>
                    <option>🏠 استلام فرع</option>
                </select>
                <select id="orderType">
                    <option value="سلة">🛒 طلب سلة</option>
                    <option value="واتساب">💬 طلب واتساب</option>
                </select>
            </div>
            <button id="saveBtn" onclick="saveOrder()" class="btn-save">حفظ الطلب ✅</button>
        </section>

        <div class="tools-area">
            <input type="text" id="searchInput" oninput="filterOrders()" placeholder="🔍 ابحث بالاسم، الرقم، أو البوليصة...">
            <div class="admin-btns">
                <button onclick="toggleArchive()" id="archiveBtn" class="btn-gray">📂 إظهار الأرشيف</button>
                <button onclick="printAllToday()" class="btn-gold">⎙ طباعة كشف اليوم</button>
            </div>
        </div>

        <main class="lists-wrapper">
            <div class="list-col">
                <h2 class="list-title">🛒 طلبات سلة</h2>
                <div id="sallaList"></div>
            </div>
            <div class="list-col">
                <h2 class="list-title">💬 طلبات واتساب</h2>
                <div id="whatsappList"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام سلطان العسل المتكامل</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="loginPage" class="login-page">
        <div class="login-card">
            <img src="1000031072.png">
            <h2>سلطان العسل</h2>
            <input type="text" id="username" placeholder="اسم الموظف">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">دخول للنظام</button>
        </div>
    </div>

    <div id="appBody" style="display:none;" class="app-container">
        <header class="main-header">
            <h2>🍯 سلطان العسل</h2>
            <div>الموظف الحالي: <span id="displayName" class="user-badge"></span> 
            <button onclick="logout()" style="background:#dc3545; color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer; margin-right:10px;">خروج</button></div>
        </header>

        <div class="stats-container">
            <div class="stat-card admin-only"><h3>إجمالي طلبات اليوم</h3><p id="statTotalOrders">0</p></div>
            <div class="stat-card admin-only"><h3>إجمالي مبيعات اليوم</h3><p id="statTotalSales">0</p></div>
            <div class="stat-card omar"><h3>مبيعات عمر</h3><p id="statOmar">0</p></div>
            <div class="stat-card maryam"><h3>مبيعات مريم</h3><p id="statMaryam">0</p></div>
        </div>

        <div class="filter-bar">
            <span>التاريخ:</span>
            <input type="date" id="calendarFilter" onchange="loadData()">
            <input type="text" id="searchInput" onkeyup="loadData()" placeholder="🔍 ابحث بالاسم أو رقم الطلب في الأرشيف..." style="flex:1;">
            <button onclick="printAllToday()" class="btn-print-all">⎙ طباعة كافة طلبات اليوم</button>
        </div>

        <section class="form-section">
            <textarea id="smartInput" oninput="processSmartPaste()" placeholder="الصق نص سلة هنا للاستخراج التلقائي..."></textarea>
            <div class="input-grid">
                <input type="text" id="custName" placeholder="اسم العميل الكامل">
                <input type="text" id="orderID" placeholder="رقم الطلب">
                <input type="text" id="trackingID" placeholder="رقم البوليصة">
                <input type="number" id="orderPrice" placeholder="الإجمالي (ريال)">
                <input type="text" id="prepEmp" placeholder="مسؤول التجهيز">
                
                <select id="deliveryType">
                    <option value="شحن سمسا">📦 شحن سمسا</option>
                    <option value="توصيل مندوب">🛵 توصيل مندوب</option>
                    <option value="استلام من الفرع">🏪 استلام من الفرع</option>
                </select>

                <select id="branchName">
                    <option value="فرع المحالة">📍 فرع المحالة</option>
                    <option value="فرع الروضة">📍 فرع الروضة</option>
                    <option value="فرع التعمير">📍 فرع التعمير</option>
                </select>

                <select id="orderType">
                    <option value="سلة">🛒 طلب سلة</option>
                    <option value="واتساب">💬 طلب واتساب</option>
                </select>
            </div>
            <button onclick="saveOrder()" id="saveBtn" style="width:100%; margin-top:20px; padding:18px; background:#28a745; color:white; border:none; border-radius:15px; cursor:pointer; font-weight:bold; font-size:18px;">حفظ الطلب بنجاح ✅</button>
        </section>

        <div style="display:flex; gap:25px; flex-wrap:wrap;">
            <div style="flex:1; min-width:350px;"><h3>🛒 طلبات سلة</h3><hr><br><div id="sallaList"></div></div>
            <div style="flex:1; min-width:350px;"><h3>💬 طلبات واتساب</h3><hr><br><div id="whatsappList"></div></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

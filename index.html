<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلطان العسل - النظام الاحترافي</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <img src="1000031072.png" alt="الشعار" class="login-logo">
        <h2>تسجيل الدخول للنظام</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()" class="btn-primary">دخول</button>
    </div>

    <div id="appBody" class="app-container" style="display: none;">
        <header class="main-header">
            <img src="1000031072.png" alt="الشعار" class="main-logo">
            <h1 class="system-title">سلطان العسل</h1>
            <div id="userWelcome" class="stats-container"></div> 
            <button onclick="logout()" class="btn-logout">تسجيل خروج ⬅️</button>
        </header>

        <section class="smart-paste-box">
            <textarea id="smartInput" placeholder="لصق نص الطلب من سلة هنا..."></textarea>
            <button onclick="processSmartPaste()" class="btn-smart">✨ استخراج تلقائي</button>
        </section>

        <section class="form-section">
            <div class="input-grid">
                <input type="text" id="custName" placeholder="👤 اسم العميل">
                <input type="text" id="prepEmp" placeholder="👨‍🍳 مسؤول التجهيز">
                <input type="text" id="orderID" placeholder="🔢 رقم الطلب">
                <input type="text" id="trackingID" placeholder="📄 رقم البوليصة">
                <input type="number" id="orderPrice" placeholder="💰 السعر الإجمالي">
                <select id="branchName">
                    <option value="فرع المحالة">📍 فرع المحالة</option>
                    <option value="فرع الروضة">📍 فرع الروضة</option>
                    <option value="فرع التعمير">📍 فرع التعمير</option>
                </select>
                <select id="deliveryType">
                    <option value="توصيل مندوب">🛵 توصيل مندوب</option>
                    <option value="شحن سمسا">📦 شحن سمسا</option>
                    <option value="استلام من الفرع">🏠 استلام من الفرع</option>
                </select>
                <select id="orderType">
                    <option value="سلة">🛒 طلب سلة</option>
                    <option value="واتساب">💬 طلب واتساب</option>
                </select>
            </div>
            <button onclick="saveOrder()" class="btn-primary">إضافة وحفظ الطلب ✅</button>
        </section>

        <div class="search-section">
            <input type="text" id="searchInput" oninput="loadData()" placeholder="🔍 ابحث في اليوم والأرشيف...">
        </div>

        <div class="admin-actions">
            <button onclick="toggleArchive()" id="archiveBtn" class="btn-secondary">📂 سجل الأرشيف</button>
            <button onclick="printMyOrders()" class="btn-print-yellow">⎙ طباعة طلباتي</button>
            <button id="printAllBtn" onclick="printAllToday()" class="btn-print-green">⎙ طباعة الكل</button>
        </div>

        <main class="main-content">
            <div class="list-column">
                <h2 class="section-title">🛒 طلبات سلة</h2>
                <div id="sallaList"></div>
            </div>
            <div class="list-column">
                <h2 class="section-title">💬 طلبات واتساب</h2>
                <div id="whatsappList"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
